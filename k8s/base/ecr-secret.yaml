# CloudFormation/Terraform will set AWS_ACCOUNT_ID and AWS_REGION
# For EKS with IAM roles, this provides ECR pull credentials
apiVersion: v1
kind: Secret
metadata:
  name: ecr-secret
  namespace: microservices
type: kubernetes.io/dockercfg
data:
  # This will be populated by a script or Terraform
  # Base64 encoded: {"AWS_ACCOUNT_ID.dkr.ecr.AWS_REGION.amazonaws.com":{"auth":"TOKEN"}}
  .dockercfg: eyJBV1NfQUNDT1VOVF9JRC5ka3IuZWNyLkFXU19SRUdJT04uYW1hem9uYXdzLmNvbSI6eyJhdXRoIjoiQlZCVFRWOVRkWE4zVGtsVVQwOVQifX0=
---
# Alternative: Use IAM-based authentication via IRSA
# This role is created by Terraform and allows pods to pull from ECR
apiVersion: v1
kind: ServiceAccount
metadata:
  name: default
  namespace: microservices
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/SERVICE_ACCOUNT_ROLE_NAME
