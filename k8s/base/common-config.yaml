# Common configuration for all microservices
# This file contains ConfigMaps and other shared resources
apiVersion: v1
kind: ConfigMap
metadata:
  name: microservices-config
  namespace: microservices
data:
  # Service discovery - services use these addresses to communicate
  PRODUCT_CATALOG_SERVICE_ADDR: "productcatalog-service.microservices.svc.cluster.local:3550"
  SHIPPING_SERVICE_ADDR: "shippingservice-service.microservices.svc.cluster.local:50052"
  CURRENCY_SERVICE_ADDR: "currencyservice-service.microservices.svc.cluster.local:7000"
  CART_SERVICE_ADDR: "cartservice-service.microservices.svc.cluster.local:7070"
  RECOMMENDATION_SERVICE_ADDR: "recommendationservice-service.microservices.svc.cluster.local:8081"
  CHECKOUT_SERVICE_ADDR: "checkoutservice-service.microservices.svc.cluster.local:5050"
  AD_SERVICE_ADDR: "adservice-service.microservices.svc.cluster.local:9555"
  PAYMENT_SERVICE_ADDR: "paymentservice-service.microservices.svc.cluster.local:50051"
  EMAIL_SERVICE_ADDR: "emailservice-service.microservices.svc.cluster.local:8082"
  SHOPPING_ASSISTANT_SERVICE_ADDR: "shoppingassistantservice-service.microservices.svc.cluster.local:8083"
  REDIS_ADDR: "redis-service.microservices.svc.cluster.local:6379"
  
  # Observability
  DISABLE_PROFILER: "1"
  ENABLE_TRACING: "1"
