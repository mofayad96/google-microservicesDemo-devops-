apiVersion: apps/v1
kind: Deployment 
metadata:
  name: cartservice
  namespace: microservices
  labels:
    app: cartservice
    version: v1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cartservice
  minReadySeconds: 10
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template: 
    metadata: 
      labels:
        app: cartservice
        version: v1

    spec:
      serviceAccountName: default
      securityContext:
        runAsNonRoot: true
      containers:
      - name: cartservice
        image: cartservice:latest
        imagePullPolicy: IfNotPresent
        securityContext:
          readOnlyRootFilesystem: true
        ports:
        - containerPort: 7070
          name: grpc
          protocol: TCP
        env:
        - name: ASPNETCORE_URLS
          value: http://*:7070
        - name: REDIS_ADDR
          valueFrom:
            configMapKeyRef:
              name: microservices-config
              key: REDIS_ADDR
        - name: DISABLE_PROFILER
          valueFrom:
            configMapKeyRef:
              name: microservices-config
              key: DISABLE_PROFILER
        - name: ENABLE_TRACING
          valueFrom:
            configMapKeyRef:
              name: microservices-config
              key: ENABLE_TRACING
        - name: OTEL_SERVICE_NAME
          value: "cartservice"
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: "http://otel-collector.microservices.svc.cluster.local:4317"
        - name: OTEL_EXPORTER_OTLP_PROTOCOL
          value: "grpc"
        - name: OTEL_TRACES_EXPORTER
          value: "otlp"
        - name: OTEL_METRICS_EXPORTER
          value: "none"
        - name: OTEL_LOGS_EXPORTER
          value: "none"
        - name: OTEL_RESOURCE_ATTRIBUTES
          value: "service.namespace=microservices,deployment.environment=production"
        resources:
          requests:
            cpu: 100m
            memory: 512Mi
          limits:
            cpu: 500m
            memory: 1Gi
        livenessProbe:
          tcpSocket:
            port: 7070
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          tcpSocket:
            port: 7070
          initialDelaySeconds: 20
          periodSeconds: 5
          timeoutSeconds: 5
          failureThreshold: 2
        volumeMounts:
        - name: tmp
          mountPath: /tmp
      volumes:
      - name: tmp
        emptyDir: {}
      imagePullSecrets:
        - name: ecr-secret
---
apiVersion: v1
kind: Service
metadata: 
  name: cartservice-service
  namespace: microservices
  labels:
    app: cartservice
spec:
  type: ClusterIP
  selector:
    app: cartservice
  ports:
    - protocol: TCP
      port: 7070
      targetPort: 7070
      name: grpc 